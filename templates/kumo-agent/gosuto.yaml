apiVersion: gosuto/v1
metadata:
  name: "{{.AgentName}}"
  template: kumo-agent
  canonicalName: kumo
  description: >
    News and web search agent. Searches Brave Search for recent news, articles,
    and public information about the companies, tickers, or topics requested by
    Ruriko or other agents.

trust:
  allowedRooms:
    - "{{.AdminRoom}}"
  allowedSenders:
    - "*"
  trustedPeers:
    - mxid: "{{.PeerMXID}}"
      roomId: "{{.PeerRoom}}"
      alias: "{{.PeerAlias}}"
      protocols:
        - "{{.PeerProtocolID}}"
  requireE2EE: false
  adminRoom: "{{.AdminRoom}}"

limits:
  maxRequestsPerMinute: 10
  maxTokensPerRequest: 8192
  maxConcurrentRequests: 2
  maxMonthlyCostUSD: 10.00

capabilities:
  - name: allow-brave-search
    mcp: brave-search
    tool: "*"
    allow: true

  - name: allow-matrix-send
    mcp: builtin
    tool: matrix.send_message
    allow: true

  - name: deny-all-others
    mcp: "*"
    tool: "*"
    allow: false

messaging:
  allowedTargets:
    - roomId: "{{.PeerRoom}}"
      alias: "{{.PeerAlias}}"
    - roomId: "{{.UserRoom}}"
      alias: user
  maxMessagesPerMinute: 30

workflow:
  schemas:
    kairoNewsRequest:
      type: object
      required:
        - run_id
        - tickers
      properties:
        run_id:
          type: integer
        tickers:
          type: array
        market_summary:
          type: string
    kumoNewsResponse:
      type: object
      required:
        - run_id
        - summary
        - headlines
        - material
      properties:
        run_id:
          type: integer
        summary:
          type: string
        headlines:
          type: array
        material:
          type: boolean
    searchPlan:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required:
              - query
            properties:
              query:
                type: string
    searchResult:
      type: string
    searchIterationContract:
      type: object
      required:
        - index
        - item
        - outputs
        - result
      properties:
        index:
          type: integer
        item:
          type: object
          required:
            - query
          properties:
            query:
              type: string
        outputs:
          type: object
        result:
          type: string
  protocols:
    - id: "{{.PeerProtocolID}}"
      trigger:
        type: matrix.protocol_message
        prefix: "{{.PeerProtocolPrefix}}"
      inputSchemaRef: kairoNewsRequest
      retries: 1
      steps:
        - type: parse_input
          inputSchemaRef: kairoNewsRequest
          retries: 1
        - type: plan
          prompt: "Build a concise search plan for these tickers: $input.tickers"
          outputSchemaRef: searchPlan
          retries: 1
        - type: for_each
          itemsExpr: "$steps.step_1.items"
          itemVar: plan_item
          maxIterations: 5
          forEachResultSchemaRef: searchResult
          forEachIterationSchemaRef: searchIterationContract
          steps:
            - type: tool
              tool: brave-search__web_search
              argsTemplate:
                query: "$state.plan_item.query"
              outputSchemaRef: searchResult
        - type: collect
          collectFrom: "$steps.step_2"
          collectMode: result
          collectFlatten: false
        - type: summarize
          prompt: "Summarize these collected search results: $steps.step_3 and produce the response schema for run $input.run_id"
          outputSchemaRef: kumoNewsResponse
          retries: 2
        - type: send_message
          targetAlias: "{{.PeerAlias}}"
          payloadTemplate: "Hey {{.PeerAlias}}, KUMO_NEWS_RESPONSE $steps.step_4"
        - type: persist
          persistKey: kumo.last_response
          persistValue: "$steps.step_4"

persona:
  systemPrompt: |
    You are Kumo, a news and web search agent. Your role is to search for and
    retrieve recent news, articles, and public information about the companies,
    tickers, or topics you are given. Summarise the key findings clearly and
    concisely in a structured format. Focus on factual reporting. Do not
    speculate or add commentary beyond what the sources say. Always include
    source references for every claim.
  llmProvider: openai
  model: gpt-4o
  temperature: 0.3
  apiKeySecretRef: "{{.AgentName}}.openai-api-key"

secrets:
  - name: "{{.AgentName}}.openai-api-key"
    envVar: OPENAI_API_KEY
    required: true
  - name: "{{.AgentName}}.brave-api-key"
    envVar: BRAVE_API_KEY
    required: true

mcps:
  - name: brave-search
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-brave-search"
    env:
      BRAVE_API_KEY: "{{`${BRAVE_API_KEY}`}}"
    autoRestart: true

instructions:
  role: |
    You are a news and web search agent. When given a list of tickers, company
    names, or topics, search for recent and relevant news using your tools.
    Return a concise, structured summary of findings with source references.
    Do not speculate beyond what sources say.
  workflow:
    - trigger: "message received with tickers or topics to research"
      action: "Use brave-search MCP to find recent news and summarize findings with source references."
    - trigger: "after gathering results"
      action: "Summarise findings in a structured format (headline, source, date, relevance). Send summary back to the requester via matrix.send_message."
  context:
    user: "The user is the sole approver. Only contact them directly if explicitly instructed."
    peers:
      - name: "{{.PeerAlias}}"
        role: "Primary requester peer. Sends you tickers or topics; you return a news summary."
